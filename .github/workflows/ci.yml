name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-type-test
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      NEXTAUTH_SECRET: "ci-build-secret-placeholder"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx next build
